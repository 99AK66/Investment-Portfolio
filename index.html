h2 { text-align: center; }

}

label {

}

.primary {

.secondary {

.kpi-card {

}

.kpi-value {

  font-weight: bold;
  margin-top: 5px;
}

.green { color: #00e676; }
.red { color: #ff5252; }







  
  
</style>
</head>

  <script>

let chart;
let currentStep = 1;

/* =========================
   📦 DATABASE
========================= */
const itemsDB = {
  food: [
    { name: "🍛 ข้าวแกง", price: 40, inflation: 4.5 },
    { name: "🍜 ก๋วยเตี๋ยว", price: 50, inflation: 4.2 },
    { name: "☕ กาแฟ", price: 60, inflation: 5.0 }
  ],
  energy: [
    { name: "⛽ น้ำมัน", price: 40, inflation: 6.5 },
    { name: "💡 ค่าไฟ", price: 1000, inflation: 5.8 }
  ],
  luxury: [
    { name: "📱 มือถือ", price: 30000, inflation: 2.5 },
    { name: "🪙 ทองคำ", price: 30000, inflation: 3.2 }
  ]
};

/* =========================
   🚀 INIT UI
========================= */
function renderItems(){
  const cat = document.getElementById("category").value;
  const select = document.getElementById("itemName");

  select.innerHTML = "";

  itemsDB[cat].forEach(item=>{
    const opt = document.createElement("option");
    opt.value = item.name;
    opt.textContent = item.name;
    opt.dataset.price = item.price;
    opt.dataset.inflation = item.inflation;
    select.appendChild(opt);
  });

  setInflation();
}

function setInflation(){
  const select = document.getElementById("itemName");
  const opt = select.options[select.selectedIndex];

  document.getElementById("itemPrice").value = opt.dataset.price;
  document.getElementById("inflation").value = opt.dataset.inflation;
}

renderItems();

/* =========================
   🧠 AI
========================= */
function getTopImpactItem(){
  let all = [];

  Object.keys(itemsDB).forEach(cat=>{
    itemsDB[cat].forEach(i=>{
      all.push({
        name: i.name,
        score: i.price * i.inflation
      });
    });
  });

  all.sort((a,b)=>b.score-a.score);
  return all[0];
}

/* =========================
   🔧 UI CONTROL
========================= */
function setRate(value){
  document.getElementById("rate").value = value;
}

function showStep(s){
  document.querySelectorAll('.step').forEach(e=>e.classList.remove('active'));
  document.getElementById('step'+s).classList.add('active');
}

function showResult(){
  document.getElementById("resultCard").style.display = "block";
  document.getElementById("chartCard").style.display = "block";
}

function hideResult(){
  document.getElementById("resultCard").style.display = "none";
  document.getElementById("chartCard").style.display = "none";
}

function toggleCustomItem(){
  const val = document.getElementById("itemName").value;
  const custom = document.getElementById("customItemName");
  custom.style.display = (val === "custom") ? "block" : "none";
}

/* =========================
   ⏭ STEP FLOW (ของเดิมครบ)
========================= */
function nextStep(){

  if(currentStep === 1){
    const asset = document.getElementById("assetName").value.trim();
    if(!asset) return Swal.fire('ข้อมูลไม่ครบ','กรุณากรอกชื่อทรัพย์สิน','warning');
  }

  if(currentStep === 2){
    const monthly = document.getElementById("monthly").value;
    const rate = document.getElementById("rate").value;
    const startAge = document.getElementById("startAge").value;
    const endAge = document.getElementById("endAge").value;

    if(!monthly || !rate || !startAge || !endAge)
      return Swal.fire('ข้อมูลไม่ครบ','กรุณากรอกข้อมูลให้ครบ','warning');
  }

  if(currentStep === 3){
    const inflation = document.getElementById("inflation").value;
    if(!inflation) return Swal.fire('ยังไม่ได้กรอก','กรอกเงินเฟ้อ','warning');
  }

  if(currentStep === 4){
    const itemName = document.getElementById("itemName").value.trim();
    const itemPrice = document.getElementById("itemPrice").value;

    if(!itemName || !itemPrice)
      return Swal.fire('ข้อมูลสินค้าไม่ครบ','กรอกสินค้า','warning');
  }

  if(currentStep < 5) currentStep++;
  showStep(currentStep);

  if(currentStep !== 5) hideResult();
}

function prevStep(){
  if(currentStep > 1) currentStep--;
  showStep(currentStep);
  if(currentStep !== 5) hideResult();
}

========================= */

  const assetName = document.getElementById('assetName').value;

  const endAge = +document.getElementById('endAge').value;

  const inflation = +document.getElementById('inflation').value / 100;

  if(itemName === "custom"){
    itemName = document.getElementById("customItemName").value;

    currentPrice *= (1+inf);

      cashArr.push(Math.round(cash));
