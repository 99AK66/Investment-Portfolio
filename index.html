<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCA Mobile</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0d0d0d;
  color: #fff;
}

/* container หลัก */
.main {
  padding-bottom: 100px; /* 🔥 สำคัญ: กันปุ่มทับ */
}

.header {
  padding: 16px;
  font-size: 20px;
  font-weight: bold;
}

.card {
  background: #1a1a1a;
  margin: 12px;
  padding: 16px;
  border-radius: 16px;
}

.input-group {
  margin-bottom: 16px;
}

label {
  font-size: 13px;
  opacity: 0.7;
}

input, select {
  width: 100%;
  padding: 14px;
  margin-top: 6px;
  border-radius: 12px;
  border: none;
  background: #2a2a2a;
  color: #fff;
  font-size: 16px;
}

/* result */
.result {
  font-size: 16px;
  line-height: 1.6;
}

/* chart */
canvas {
  margin-top: 10px;
  max-height: 300px;
}

/* ปุ่มล่าง */
.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  padding: 10px;
  background: rgba(13,13,13,0.9);
  backdrop-filter: blur(10px);
  border-top: 1px solid rgba(255,255,255,0.1);
}

button {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  font-size: 16px;
  font-weight: bold;
  background: #00e676;
  color: #000;
}

/* ป้องกัน zoom ตอนกด input */
input, select {
  font-size: 16px;
}
</style>
</head>

<body>

<div class="main">

  <div class="header">📊 DCA Calculator</div>

  <div class="card">

    <div class="input-group">
      <label>เงินต่อเดือน</label>
      <input type="number" id="monthly" value="0">
    </div>

    <div class="input-group">
      <label>อายุเริ่มต้น</label>
      <input type="number" id="startAge" value="0">
    </div>

    <div class="input-group">
      <label>อายุสิ้นสุด</label>
      <input type="number" id="endAge" value="0">
    </div>

    <div class="input-group">
      <label>เลือกผลตอบแทน</label>
      <select id="preset" onchange="setRate()">
        <option value="">-- เลือก --</option>
        <option value="5">ทั่วไป 5%</option>
        <option value="10">ปานกลาง 10%</option>
        <option value="15">เติบโตสูง 15%</option>
      </select>
    </div>

    <div class="input-group">
      <label>หรือกำหนดเอง (%)</label>
      <input type="number" id="rate" value="0">
    </div>

  </div>

  <div class="card result" id="result">
    กรอกข้อมูลแล้วกด “คำนวณ”
  </div>

  <div class="card">
    <canvas id="chart"></canvas>
  </div>

</div>

<div class="footer">
  <button onclick="calculate()">คำนวณ</button>
</div>

<script>
let chart;

function setRate() {
  const preset = document.getElementById("preset").value;
  if (preset) document.getElementById("rate").value = preset;
}

function calculate() {
  const monthly = parseFloat(document.getElementById('monthly').value);
  const startAge = parseInt(document.getElementById('startAge').value);
  const endAge = parseInt(document.getElementById('endAge').value);
  const rate = parseFloat(document.getElementById('rate').value) / 100;

  if (endAge <= startAge) {
    alert("อายุไม่ถูกต้อง");
    return;
  }

  const months = (endAge - startAge) * 12;
  const monthlyRate = rate / 12;

  let portfolio = 0;
  let total = 0;

  let labels = [];
  let data = [];

  let age = startAge;

  for (let m = 1; m <= months; m++) {
    portfolio = portfolio * (1 + monthlyRate) + monthly;
    total += monthly;

    if (m % 12 === 0) {
      labels.push(age);
      data.push(Math.round(portfolio));
      age++;
    }
  }

  document.getElementById('result').innerHTML =
    `💰 ลงทุนรวม: ${total.toLocaleString()} บาท<br>
     🚀 พอร์ต: ${Math.round(portfolio).toLocaleString()} บาท`;

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'พอร์ต',
        data: data,
        borderWidth: 3,
        tension: 0.4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: "#fff" } }
      },
      scales: {
        x: { ticks: { color: "#fff" } },
        y: { ticks: { color: "#fff" } }
      }
    }
  });
}
</script>

</body>
</html>
