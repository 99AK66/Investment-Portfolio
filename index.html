<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCA Calculator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: #fff;
}

.container {
  max-width: 480px;
  margin: auto;
  padding: 20px;
}

h2 {
  text-align: center;
}

.card {
  background: #1c1c1c;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

label {
  display: block;
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.8;
}

input, select {
  width: 100%;
  padding: 14px;
  margin-top: 6px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.primary { background:#00c853; color:#fff; }

#result {
  margin-top: 10px;
  line-height: 1.6;
}

canvas {
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 DCA Calculator</h2>

<div class="card">

<label>เลือกรูปแบบผลตอบแทน</label>
<select id="preset" onchange="setRate()">
  <option value="5">ทั่วไป (5%)</option>
  <option value="10" selected>ปานกลาง (10%)</option>
  <option value="15">สูง (15%)</option>
  <option value="custom">กำหนดเอง</option>
</select>

<label>ผลตอบแทน (% ต่อปี)</label>
<input type="number" id="rate" value="10">

<label>เงินต่อเดือน</label>
<input type="number" id="monthly" value="2000">

<label>อายุเริ่มต้น</label>
<input type="number" id="startAge" value="28">

<label>อายุสิ้นสุด</label>
<input type="number" id="endAge" value="60">

<button class="primary" onclick="calculate()">คำนวณ</button>

</div>

<div class="card">
<div id="result"></div>
<canvas id="chart"></canvas>
</div>

</div>

<script>
let chart;

// 🔥 preset control
function setRate() {
  const preset = document.getElementById("preset").value;
  const rate = document.getElementById("rate");

  if (preset === "custom") {
    rate.disabled = false;
    rate.focus();
  } else {
    rate.value = preset;
    rate.disabled = true;
  }
}

function calculate() {
  const monthly = parseFloat(document.getElementById('monthly').value);
  const startAge = parseInt(document.getElementById('startAge').value);
  const endAge = parseInt(document.getElementById('endAge').value);
  const rate = parseFloat(document.getElementById('rate').value) / 100;

  if (!monthly || !startAge || !endAge || !rate) {
    alert("กรอกข้อมูลให้ครบ");
    return;
  }

  const months = (endAge - startAge) * 12;
  const monthlyRate = rate / 12;

  let portfolio = 0;
  let total = 0;

  let labels = [];
  let data = [];

  let age = startAge;

  for (let m = 1; m <= months; m++) {
    portfolio = portfolio * (1 + monthlyRate) + monthly;
    total += monthly;

    if (m % 12 === 0) {
      labels.push(age);
      data.push(Math.round(portfolio));
      age++;
    }
  }

  document.getElementById('result').innerHTML =
    `💰 เงินลงทุนรวม: ${total.toLocaleString()} บาท<br>
     🚀 พอร์ตสุดท้าย: ${Math.round(portfolio).toLocaleString()} บาท`;

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "มูลค่าพอร์ต",
        data,
        borderWidth: 2,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color: "#fff" } }
      },
      scales: {
        x: { ticks: { color: "#fff" } },
        y: { ticks: { color: "#fff" } }
      }
    }
  });
}

// init
setRate();
</script>

</body>
</html>
