<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCA Simulator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #1a1a1a, #0d0d0d);
  color: #fff;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h2 { text-align: center; }

.card {
  background: rgba(30,30,30,0.85);
  backdrop-filter: blur(10px);
  padding: 16px;
  border-radius: 16px;
  margin-bottom: 15px;
}

label {
  display: block;
  margin-top: 10px;
  font-size: 13px;
  opacity: 0.8;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border-radius: 10px;
  border: none;
  background: #2a2a2a;
  color: #fff;
}

button {
  padding: 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  flex: 1;
}

.primary {
  background: linear-gradient(135deg,#00c853,#00e676);
  color: #000;
  font-weight: bold;
}

.secondary {
  background: #333;
  color: #fff;
}

.btn-row {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.step { display: none; }
.step.active { display: block; }

#resultCard, #chartCard {
  display: none;
}

  .center-btn {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}
  .badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 999px;
  background: linear-gradient(135deg, #00c853, #00e676);
  color: #000;
  font-size: 12px;
  font-weight: bold;
}

.asset-title {
  margin-top: 8px;
  font-size: 20px;
  font-weight: 700;
  color: #00e676;
  letter-spacing: 0.5px;
}

.kpi-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 15px;
}

.kpi-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 12px;
  border-radius: 12px;
}

.kpi-title {
  font-size: 11px;
  opacity: 0.7;
}

.kpi-value {
  font-size: 16px;
  font-weight: bold;
  margin-top: 5px;
}

.green { color: #00e676; }
.red { color: #ff5252; }





.badge-red {
  background: linear-gradient(135deg, #ff5252, #ff1744);
  color: #fff;
}
.badge-green {
  background: linear-gradient(135deg, #00e676, #00c853);
  color: #000;
}
.progress {
  width: 100%;
  height: 10px;
  background: rgba(255,255,255,0.1);
  border-radius: 999px;
  overflow: hidden;
  margin-top: 8px;
}
.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg,#00e676,#00c853);
  transition: width 1.2s ease;
}
.highlight {
  animation: pop 0.6s ease;
}
@keyframes pop {
  0% { transform: scale(0.8); opacity: 0.5; }
  60% { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; }
}


  
  
</style>
</head>

<body>

<div class="container">

<h2>📊 DCA Simulator</h2>

<div class="card">

<!-- STEP 1 -->
<div class="step active" id="step1">
  <label>ชื่อทรัพย์สิน</label>
  <input id="assetName" placeholder="เช่น AMD, SPUS">

  <div class="center-btn">
    <button class="primary" onclick="nextStep()">ต่อไป</button>
  </div>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
<label>เงินลงทุนต่อเดือน</label>
<input type="number" id="monthly" placeholder="เช่น 500 บาท">

<label>ผลตอบแทน (%)</label>

<div class="btn-row">
  <button class="secondary" onclick="setRate(5)">ทั่วไป 5%</button>
  <button class="secondary" onclick="setRate(10)">ปานกลาง 10%</button>
  <button class="secondary" onclick="setRate(15)">เติบโตมาก 15%</button>
</div>

<input type="number" id="rate" placeholder="กรอกผลตอบแทน (%) ที่คาดว่าจะได้รับต่อปี">

<label>อายุเริ่มต้นลงทุน</label>
<input type="number" id="startAge" placeholder="25 ปี">

<label>อายุคาดว่าจะเกษียณ</label>
<input type="number" id="endAge" placeholder="60 ปี">

<div class="btn-row">
  <button class="secondary" onclick="prevStep()">ย้อนกลับ</button>
  <button class="primary" onclick="nextStep()">ต่อไป</button>
</div>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
<label>เงินเฟ้อ (%)</label>
<input type="number" id="inflation" placeholder="เช่น 3 %">

<div class="btn-row">
  <button class="secondary" onclick="prevStep()">ย้อนกลับ</button>
  <button class="primary" onclick="nextStep()">ต่อไป</button>
</div>
</div>

<!-- STEP 4 -->
<div class="step" id="step4">
<label>ชื่อสินค้า</label>
<input id="itemName" placeholder="เช่น ข้าวแกง">

<label>ราคาต่อหน่วย</label>
<input type="number" id="itemPrice" placeholder="เช่น 30 บาท">

<div class="btn-row">
  <button class="secondary" onclick="prevStep()">ย้อนกลับ</button>
  <button class="primary" onclick="nextStep()">ต่อไป</button>
</div>
</div>

<!-- STEP 5 -->
<div class="step" id="step5">
<h3>พร้อมคำนวณ</h3>

<div class="btn-row">
  <button class="secondary" onclick="prevStep()">ย้อนกลับ</button>
  <button class="primary" onclick="calculate()">คำนวณ</button>
</div>
</div>

</div>

<!-- RESULT -->
<div class="card" id="resultCard">
  <div id="result"></div>
</div>

<!-- CHART -->
<div class="card" id="chartCard">
  <canvas id="chart"></canvas>
</div>

</div>

<script>

let chart;
let currentStep = 1;

hideResult();

  function setRate(value){
  document.getElementById("rate").value = value;
}

function showStep(s){
  document.querySelectorAll('.step').forEach(e=>e.classList.remove('active'));
  document.getElementById('step'+s).classList.add('active');
}

function nextStep(){

  if(currentStep === 1){
    const asset = document.getElementById("assetName").value.trim();
    if(!asset){
      Swal.fire({
        icon: 'warning',
        title: 'ข้อมูลไม่ครบ',
        text: 'กรุณากรอกชื่อทรัพย์สิน'
      });
      return;
    }
  }

  if(currentStep === 2){
    const monthly = document.getElementById("monthly").value;
    const rate = document.getElementById("rate").value;
    const startAge = document.getElementById("startAge").value;
    const endAge = document.getElementById("endAge").value;

    if(!monthly || !rate || !startAge || !endAge){
      Swal.fire({
        icon: 'warning',
        title: 'ข้อมูลไม่ครบ',
        text: 'กรุณากรอกข้อมูลการลงทุนให้ครบ'
      });
      return;
    }
  }

  if(currentStep === 3){
    const inflation = document.getElementById("inflation").value;
    if(!inflation){
      Swal.fire({
        icon: 'warning',
        title: 'ยังไม่ได้กรอก',
        text: 'กรุณากรอกเงินเฟ้อ'
      });
      return;
    }
  }

  if(currentStep === 4){
    const itemName = document.getElementById("itemName").value.trim();
    const itemPrice = document.getElementById("itemPrice").value;

    if(!itemName || !itemPrice){
      Swal.fire({
        icon: 'warning',
        title: 'ข้อมูลสินค้าไม่ครบ',
        text: 'กรุณากรอกชื่อสินค้าและราคา'
      });
      return;
    }
  }

  if(currentStep < 5) currentStep++;
  showStep(currentStep);

  if(currentStep !== 5){
    hideResult();
  }
}

function prevStep(){
  if(currentStep > 1) currentStep--;
  showStep(currentStep);

  if(currentStep !== 5){
    hideResult();
  }
}

function showResult(){
  document.getElementById("resultCard").style.display = "block";
  document.getElementById("chartCard").style.display = "block";
}

function hideResult(){
  document.getElementById("resultCard").style.display = "none";
  document.getElementById("chartCard").style.display = "none";
}

function animate(chart, labels, invest, cash){

  let i = 0;

  const timer = setInterval(() => {

    if(i >= labels.length){
      clearInterval(timer);
      return;
    }

    chart.data.labels.push(labels[i]);
    chart.data.datasets[0].data.push(invest[i]);
    chart.data.datasets[1].data.push(cash[i]);

    chart.update();

    i++;

  }, 200);
}

function calculate(){

  const assetName = document.getElementById('assetName').value;
  const monthly = +document.getElementById('monthly').value;
  const rate = +document.getElementById('rate').value / 100;
  const startAge = +document.getElementById('startAge').value;
  const endAge = +document.getElementById('endAge').value;

  const inflation = +document.getElementById('inflation').value / 100;

  const itemName = document.getElementById('itemName').value;
  const itemPrice = +document.getElementById('itemPrice').value;

  const months = (endAge - startAge) * 12;

  const r = rate / 12;
  const inf = inflation / 12;

  let port = 0;
  let cash = 0;
  let currentPrice = itemPrice;

  let labels = [];
  let invest = [];
  let cashArr = [];

  let age = startAge;

  for(let m=1;m<=months;m++){

port = port * (1 + r) + monthly;
cash = (cash + monthly) / (1 + inf);

currentPrice = currentPrice * (1 + inf);

    if(m % 12 === 0){
      labels.push(age);
      invest.push(Math.round(port));
      cashArr.push(Math.round(cash));
      age++;
    }
  }

const investUnits = Math.round(port / currentPrice);
const cashUnits = Math.round(cash / currentPrice);
  
  const ratio = (investUnits / cashUnits).toFixed(1);

const total = monthly * months;
const portfolio = port;

const profit = portfolio - total;
const profitPercent = ((profit / total) * 100).toFixed(2);

const profitClass = profit >= 0 ? "green" : "red";

 
  

const win = investUnits > cashUnits;
const diff = investUnits - cashUnits;

document.getElementById("result").innerHTML = `
📌 <span class="badge">ทรัพย์สินที่คุณเลือก DCA</span>

<div style="margin-top:8px;">
  <span class="badge ${win ? 'badge-green' : 'badge-red'}">
    ${win ? '🔥 ชนะเงินเฟ้อ' : '💀 เสียโอกาส'}
  </span>
</div>

<div class="asset-title">📊 ${assetName}</div>

<div class="kpi-grid">

  <div class="kpi-card">
    <div class="kpi-title">💰 เงินลงทุนรวม</div>
    <div class="kpi-value">${total.toLocaleString()} บาท</div>
  </div>

  <div class="kpi-card">
    <div class="kpi-title">🚀 พอร์ตสุดท้าย</div>
    <div class="kpi-value">${Math.round(portfolio).toLocaleString()} บาท</div>
  </div>

  <div class="kpi-card">
    <div class="kpi-title">📈 กำไร / ขาดทุน</div>
    <div class="kpi-value ${profitClass}">
      ${profit >= 0 ? "📈 +" : "📉"}${Math.round(profit).toLocaleString()} บาท
    </div>
  </div>

  <div class="kpi-card">
    <div class="kpi-title">⚡ ผลตอบแทน</div>
    <div class="kpi-value ${profitClass}">
      ${profit >= 0 ? "🟢" : "🔴"} ${profitPercent}%
    </div>
  </div>

</div>

<div class="kpi-card" style="margin-top:15px;">
  <div class="kpi-title">🤯 ผลกระทบจากเงินเฟ้อ (${(inflation*100).toFixed(1)}% ต่อปี)</div>

  <div style="margin-top:10px; line-height:1.7;">
    🍛 <b>${itemName}</b><br>
    🕒 วันนี้: <b>${itemPrice.toLocaleString()}</b> บาท<br>
    🚀 อนาคต: <b class="red">${Math.round(currentPrice).toLocaleString()}</b> บาท
  </div>
</div>

<div class="kpi-card" style="margin-top:10px;">
  <div class="kpi-title">📊 กำลังซื้อ (เปรียบเทียบ)</div>

  <div style="margin-top:10px;">
    💰 เงินสด: <b id="cashNum">0</b> หน่วย
    <div class="progress">
      <div id="cashBar" class="progress-bar"></div>
    </div>
  </div>

  <div style="margin-top:10px;">
    📈 DCA: <b id="investNum" class="green">0</b> หน่วย
    <div class="progress">
      <div id="investBar" class="progress-bar"></div>
    </div>
  </div>
</div>

<div class="kpi-card" style="margin-top:10px;">
  <div class="kpi-title">💥 ส่วนต่างที่เกิดขึ้น</div>
  <div class="kpi-value highlight" id="diffNum">0</div>
  <div style="opacity:0.7; font-size:12px; margin-top:5px;">
    ≈ ${(diff * itemPrice).toLocaleString()} บาท (มูลค่า ณ วันนี้)
  </div>
</div>

<div class="kpi-card" style="margin-top:10px;">
  <div class="kpi-title">⚖️ สรุปภาพรวม</div>
  <div style="margin-top:8px; line-height:1.6;">
    การลงทุนใน <b>${assetName}</b> ทำให้กำลังซื้อของคุณ 
    <b class="green">มากกว่าเงินสด ${ratio} เท่า</b><br>
    ภายใน ${endAge - startAge} ปี จากพลังของ “ดอกเบี้ยทบต้น”
  </div>
</div>
`;

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: [],
      datasets: [
        { label: assetName, data: [], borderWidth: 2 },
        { label: "เงินสด", data: [], borderDash: [5,5], borderWidth: 2 }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color: "#fff" } }
      },
      scales: {
        x: { ticks: { color: "#fff" } },
        y: { ticks: { color: "#fff" } }
      }
    }
  });

  showResult();
  currentStep = 5;
  showStep(5);

  animate(chart, labels, invest, cashArr);
}

   function animateValue(id, end){
  let start = 0;
  const duration = 1000;
  const step = end / (duration / 16);

  const el = document.getElementById(id);

  const counter = setInterval(()=>{
    start += step;
    if(start >= end){
      start = end;
      clearInterval(counter);
    }
    el.innerText = Math.floor(start).toLocaleString();
  },16);
}

// run animation
animateValue("cashNum", cashUnits);
animateValue("investNum", investUnits);
animateValue("diffNum", diff);

// progress bar
const max = Math.max(investUnits, cashUnits);

setTimeout(()=>{
  document.getElementById("cashBar").style.width =
    (cashUnits / max * 100) + "%";

  document.getElementById("investBar").style.width =
    (investUnits / max * 100) + "%";
},200);

</script>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>
</html>
