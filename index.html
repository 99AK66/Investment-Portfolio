<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DCA Calculator</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    .container {
      max-width: 480px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    .card {
      background: #1c1c1c;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: #00c853;
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    button:active {
      opacity: 0.8;
    }

    #result {
      margin-top: 15px;
      line-height: 1.6;
    }

    canvas {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>📊 DCA Calculator</h2>

  <div class="card">
    <label>เงินต่อเดือน (บาท)</label>
    <input type="number" id="monthly" value="2000">

    <label>อายุเริ่มต้น</label>
    <input type="number" id="startAge" value="28">

    <label>อายุสิ้นสุด</label>
    <input type="number" id="endAge" value="60">

    <label>ผลตอบแทน % ต่อปี</label>
    <input type="number" id="rate" value="10">

    <button onclick="calculate()">คำนวณ</button>
  </div>

  <div class="card">
    <h3 id="result"></h3>
    <canvas id="chart"></canvas>
  </div>

</div>

<script>
let chart;

function calculate() {
  const monthly = parseFloat(document.getElementById('monthly').value);
  const startAge = parseInt(document.getElementById('startAge').value);
  const endAge = parseInt(document.getElementById('endAge').value);
  const rate = parseFloat(document.getElementById('rate').value) / 100;

  const months = (endAge - startAge) * 12;
  const monthlyRate = rate / 12;

  let portfolio = 0;
  let total = 0;

  let labels = [];
  let data = [];

  let age = startAge;

  for (let m = 1; m <= months; m++) {
    portfolio = portfolio * (1 + monthlyRate) + monthly;
    total += monthly;

    if (m % 12 === 0) {
      labels.push(age);
      data.push(portfolio.toFixed(0));
      age++;
    }
  }

  document.getElementById('result').innerHTML =
    "💰 เงินลงทุนรวม: " + total.toLocaleString() + " บาท<br>" +
    "🚀 พอร์ตสุดท้าย: " + Math.round(portfolio).toLocaleString() + " บาท";

  if (chart) chart.destroy();

  const ctx = document.getElementById('chart').getContext('2d');

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'มูลค่าพอร์ต',
        data: data,
        borderWidth: 2,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          labels: { color: 'white' }
        }
      },
      scales: {
        x: {
          ticks: { color: 'white' }
        },
        y: {
          ticks: { color: 'white' }
        }
      }
    }
  });
}
</script>

</body>
</html>
