<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DCA Calculator</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: #fff;
    }

    .container {
      max-width: 480px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    .card {
      background: #1c1c1c;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    label {
      margin-top: 10px;
      display: block;
      font-size: 14px;
      opacity: 0.8;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 6px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    .primary { background: #00c853; color: #fff; }
    .secondary { background: #2962ff; color: #fff; }

    #result {
      margin-top: 10px;
      line-height: 1.6;
    }

    canvas {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>📊 DCA Calculator</h2>

  <div class="card">

    <label>ชื่อทรัพย์สิน (เช่น AAPL, TSLA, SPUS, PTT.BK)</label>
    <input type="text" id="symbol" placeholder="เช่น SPUS">

    <button class="secondary" onclick="fetchReturn()">📡 ดึงผลตอบแทน 1 ปี</button>

    <label>ผลตอบแทน (% ต่อปี)</label>
    <input type="number" id="rate" value="10">

    <label>เงินต่อเดือน (บาท)</label>
    <input type="number" id="monthly" value="2000">

    <label>อายุเริ่มต้น</label>
    <input type="number" id="startAge" value="28">

    <label>อายุสิ้นสุด</label>
    <input type="number" id="endAge" value="60">

    <button class="primary" onclick="calculate()">คำนวณ</button>

  </div>

  <div class="card">
    <div id="result"></div>
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
let chart;

// 📡 ดึงผลตอบแทน 1 ปี
async function fetchReturn() {
  const symbol = document.getElementById("symbol").value.trim();

  if (!symbol) {
    alert("กรุณาใส่ชื่อหุ้น");
    return;
  }

  try {
    const url = `https://api.codetabs.com/v1/proxy?quest=https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?range=1y&interval=1mo`;

    const res = await fetch(url);
    const data = await res.json();

    if (!data.chart || !data.chart.result) {
      alert("❌ ไม่พบข้อมูลหุ้นนี้");
      return;
    }

    const prices = data.chart.result[0].indicators.quote[0].close;

    const first = prices.find(p => p !== null);
    const last = [...prices].reverse().find(p => p !== null);

    const returnPercent = ((last - first) / first) * 100;

    document.getElementById("rate").value = returnPercent.toFixed(2);

    alert(`📈 ผลตอบแทน 1 ปี ≈ ${returnPercent.toFixed(2)}%`);

  } catch (e) {
    console.error(e);
    alert("❌ ดึงข้อมูลไม่ได้ (API อาจล่ม หรือ symbol ไม่ถูก)");
  }
}

// 📊 คำนวณ DCA
function calculate() {
  const monthly = parseFloat(document.getElementById('monthly').value);
  const startAge = parseInt(document.getElementById('startAge').value);
  const endAge = parseInt(document.getElementById('endAge').value);
  const rate = parseFloat(document.getElementById('rate').value) / 100;

  if (!monthly || !startAge || !endAge || !rate) {
    alert("กรอกข้อมูลให้ครบ");
    return;
  }

  const months = (endAge - startAge) * 12;
  const monthlyRate = rate / 12;

  let portfolio = 0;
  let total = 0;

  let labels = [];
  let data = [];

  let age = startAge;

  for (let m = 1; m <= months; m++) {
    portfolio = portfolio * (1 + monthlyRate) + monthly;
    total += monthly;

    if (m % 12 === 0) {
      labels.push(age);
      data.push(Math.round(portfolio));
      age++;
    }
  }

  document.getElementById('result').innerHTML =
    "💰 เงินลงทุนรวม: " + total.toLocaleString() + " บาท<br>" +
    "🚀 พอร์ตสุดท้าย: " + Math.round(portfolio).toLocaleString() + " บาท";

  if (chart) chart.destroy();

  const ctx = document.getElementById('chart').getContext('2d');

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'มูลค่าพอร์ต',
        data: data,
        borderWidth: 2,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color: 'white' } }
      },
      scales: {
        x: { ticks: { color: 'white' } },
        y: { ticks: { color: 'white' } }
      }
    }
  });
}
</script>

</body>
</html>
