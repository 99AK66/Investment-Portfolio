<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCA Calculator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: #fff;
}

.container {
  max-width: 480px;
  margin: auto;
  padding: 20px;
}

h2 {
  text-align: center;
}

.card {
  background: #1c1c1c;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

label {
  display: block;
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.8;
}

input, select {
  width: 100%;
  padding: 14px;
  margin-top: 6px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.primary { background:#00c853; color:#fff; }

#result {
  margin-top: 10px;
  line-height: 1.6;
}

canvas {
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 DCA Calculator</h2>

<div class="card">

<label>ชื่อทรัพย์สิน</label>
<input type="text" id="assetName" value="My Asset">

<label>เลือกรูปแบบผลตอบแทน</label>
<select id="preset" onchange="setRate()">
  <option value="5">ทั่วไป (5%)</option>
  <option value="10" selected>ปานกลาง (10%)</option>
  <option value="15">สูง (15%)</option>
  <option value="custom">กำหนดเอง</option>
</select>

<label>ผลตอบแทน (% ต่อปี)</label>
<input type="number" id="rate" value="10">

<label>เงินต่อเดือน</label>
<input type="number" id="monthly" value="2000">

<label>อายุเริ่มต้น</label>
<input type="number" id="startAge" value="28">

<label>อายุสิ้นสุด</label>
<input type="number" id="endAge" value="60">

<button class="primary" onclick="calculate()">คำนวณ</button>

</div>

<div class="card">
<div id="result"></div>
<canvas id="chart"></canvas>
</div>

</div>

<script>
let chart;

// preset control
function setRate() {
  const preset = document.getElementById("preset").value;
  const rate = document.getElementById("rate");

  if (preset === "custom") {
    rate.disabled = false;
    rate.focus();
  } else {
    rate.value = preset;
    rate.disabled = true;
  }
}

async function calculate() {

  // =========================
  // STEP 1: เลือกทรัพย์สิน
  // =========================
  const { value: assetName } = await Swal.fire({
    title: "Step 1/5",
    text: "เลือกทรัพย์สิน",
    input: "text",
    inputValue: "SPUS",
    showCancelButton: true,
    confirmButtonText: "ต่อไป"
  });

  if (!assetName) return;

  // =========================
  // STEP 2: เงินลงทุน
  // =========================
  const { value: monthly } = await Swal.fire({
    title: "Step 2/5",
    text: "เงินลงทุนต่อเดือน (บาท)",
    input: "number",
    inputValue: 2000,
    showCancelButton: true,
    confirmButtonText: "ต่อไป"
  });

  if (!monthly) return;

  const { value: rate } = await Swal.fire({
    title: "Step 2/5",
    text: "ผลตอบแทนเฉลี่ยต่อปี (%)",
    input: "number",
    inputValue: 10,
    showCancelButton: true,
    confirmButtonText: "ต่อไป"
  });

  if (!rate) return;

  const { value: startAge } = await Swal.fire({
    title: "Step 2/5",
    text: "อายุเริ่มต้น",
    input: "number",
    inputValue: 28,
    showCancelButton: true,
    confirmButtonText: "ต่อไป"
  });

  const { value: endAge } = await Swal.fire({
    title: "Step 2/5",
    text: "อายุสิ้นสุด",
    input: "number",
    inputValue: 60,
    showCancelButton: true,
    confirmButtonText: "ต่อไป"
  });

  if (!startAge || !endAge) return;

  // =========================
  // STEP 3: เงินเฟ้อ
  // =========================
  const { value: inflationInput } = await Swal.fire({
    title: "Step 3/5",
    text: "เงินเฟ้อเฉลี่ยต่อปี (%)",
    input: "number",
    inputValue: 3,
    showCancelButton: true,
    confirmButtonText: "ต่อไป"
  });

  if (!inflationInput) return;

  const inflation = parseFloat(inflationInput) / 100;

  // =========================
  // STEP 4: สินค้า
  // =========================
  const { value: itemName } = await Swal.fire({
    title: "Step 4/5",
    text: "ชื่อสินค้า (เช่น ข้าวแกง, iPhone)",
    input: "text",
    inputValue: "ข้าวแกง",
    showCancelButton: true,
    confirmButtonText: "ต่อไป"
  });

  const { value: itemPrice } = await Swal.fire({
    title: "Step 4/5",
    text: "ราคาสินค้า 1 หน่วย (บาท)",
    input: "number",
    inputValue: 40,
    showCancelButton: true,
    confirmButtonText: "สรุป"
  });

  if (!itemName || !itemPrice) return;

  // =========================
  // STEP 5: คำนวณ + สรุป
  // =========================

  const months = (endAge - startAge) * 12;
  const monthlyRate = (rate / 100) / 12;
  const inflationRate = inflation / 12;

  let portfolio = 0;
  let cash = 0;

  let labels = [];
  let spusData = [];
  let cashData = [];
  let buyingPowerData = [];

  let age = parseInt(startAge);

  for (let m = 1; m <= months; m++) {

    // 📈 ลงทุน
    portfolio = portfolio * (1 + monthlyRate) + parseFloat(monthly);

    // 💰 เงินสดโดนเงินเฟ้อ
    cash = (cash + parseFloat(monthly)) / (1 + inflationRate);

    if (m % 12 === 0) {
      labels.push(age);

      spusData.push(Math.round(portfolio));
      cashData.push(Math.round(cash));
      buyingPowerData.push(Math.round(cash / itemPrice));

      age++;
    }
  }

  // =========================
  // RESULT (สรุป)
  // =========================
  Swal.fire({
    icon: "success",
    title: "สรุปผลการจำลอง",
    html: `
      📌 <b>${assetName}</b><br><br>
      📈 พอร์ตลงทุน: ${Math.round(portfolio).toLocaleString()} บาท<br>
      💰 เงินสดจริง: ${Math.round(cash).toLocaleString()} บาท<br>
      🛒 ซื้อ ${itemName}: ${Math.round(cash / itemPrice)} หน่วย<br><br>
      📊 ดูกราฟด้านล่างได้เลย
    `
  });

  // =========================
  // CHART
  // =========================
  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels,
      datasets: [
        {
          label: `${assetName} (ลงทุน)`,
          data: spusData,
          borderWidth: 2
        },
        {
          label: "เงินสดจริง (โดนเงินเฟ้อ)",
          data: cashData,
          borderDash: [6, 4],
          borderWidth: 2
        },
        {
          label: `กำลังซื้อ (${itemName})`,
          data: buyingPowerData,
          borderWidth: 2
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color: "#fff" } }
      },
      scales: {
        x: { ticks: { color: "#fff" } },
        y: { ticks: { color: "#fff" } }
      }
    }
  });
}

// init
setRate();
</script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
