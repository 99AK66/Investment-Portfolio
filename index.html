<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCA Reality Simulator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: #fff;
}

.container {
  max-width: 480px;
  margin: auto;
  padding: 20px;
}

h2 {
  text-align: center;
}

.card {
  background: #1c1c1c;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

label {
  display: block;
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.8;
}

input {
  width: 100%;
  padding: 14px;
  margin-top: 6px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.primary { background:#00c853; color:#fff; }
.secondary { background:#333; color:#fff; }

.step { display: none; }
.step.active { display: block; }

#result {
  margin-top: 10px;
  line-height: 1.6;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 DCA Reality Simulator</h2>

<div class="card">

<!-- STEP 1 -->
<div class="step active" id="step1">
<label>ชื่อทรัพย์สิน (เช่น SPUS)</label>
<input type="text" id="assetName" value="SPUS">
<button class="primary" onclick="nextStep()">ต่อไป</button>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
<label>เงินลงทุนต่อเดือน</label>
<input type="number" id="monthly" value="2000">

<label>ผลตอบแทน (% ต่อปี)</label>
<input type="number" id="rate" value="10">

<label>อายุเริ่มต้น</label>
<input type="number" id="startAge" value="28">

<label>อายุสิ้นสุด</label>
<input type="number" id="endAge" value="60">

<button class="secondary" onclick="prevStep()">ย้อนกลับ</button>
<button class="primary" onclick="nextStep()">ต่อไป</button>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
<label>เงินเฟ้อ (% ต่อปี)</label>
<input type="number" id="inflation" value="3">

<button class="secondary" onclick="prevStep()">ย้อนกลับ</button>
<button class="primary" onclick="nextStep()">ต่อไป</button>
</div>

<!-- STEP 4 -->
<div class="step" id="step4">
<label>ชื่อสินค้า (เช่น ข้าวแกง / iPhone)</label>
<input type="text" id="itemName" value="ข้าวแกง">

<label>ราคาสินค้า 1 หน่วย (บาท)</label>
<input type="number" id="itemPrice" value="40">

<button class="secondary" onclick="prevStep()">ย้อนกลับ</button>
<button class="primary" onclick="nextStep()">ต่อไป</button>
</div>

<!-- STEP 5 -->
<div class="step" id="step5">
<h3>พร้อมคำนวณ</h3>
<button class="secondary" onclick="prevStep()">ย้อนกลับ</button>
<button class="primary" onclick="calculate()">คำนวณผลลัพธ์</button>
</div>

</div>

<div class="card">
<div id="result"></div>
<canvas id="chart"></canvas>
</div>

</div>

<script>
let chart;
let currentStep = 1;

function showStep(step) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step' + step).classList.add('active');
}

function nextStep() {
  if (currentStep < 5) currentStep++;
  showStep(currentStep);
}

function prevStep() {
  if (currentStep > 1) currentStep--;
  showStep(currentStep);
}

function calculate() {

  const assetName = document.getElementById('assetName').value;
  const monthly = parseFloat(document.getElementById('monthly').value);
  const rate = parseFloat(document.getElementById('rate').value) / 100;
  const startAge = parseInt(document.getElementById('startAge').value);
  const endAge = parseInt(document.getElementById('endAge').value);

  const inflation = parseFloat(document.getElementById('inflation').value) / 100;

  const itemName = document.getElementById('itemName').value;
  const itemPrice = parseFloat(document.getElementById('itemPrice').value);

  const months = (endAge - startAge) * 12;
  const monthlyRate = rate / 12;
  const inflationRate = inflation / 12;

  let portfolio = 0;
  let cash = 0;

  let labels = [];
  let investData = [];
  let cashData = [];

  let age = startAge;

  for (let m = 1; m <= months; m++) {

    portfolio = portfolio * (1 + monthlyRate) + monthly;
    cash = (cash + monthly) / (1 + inflationRate);

    if (m % 12 === 0) {
      labels.push(age);
      investData.push(Math.round(portfolio));
      cashData.push(Math.round(cash));
      age++;
    }
  }

  const investPower = Math.round(portfolio / itemPrice);
  const cashPower = Math.round(cash / itemPrice);
  const ratio = (investPower / cashPower).toFixed(1);

  document.getElementById('result').innerHTML = `
📌 <b>${assetName}</b><br><br>

💰 ถ้าเก็บเงินสด<br>
→ ซื้อ ${itemName}: <b>${cashPower.toLocaleString()}</b> หน่วย<br><br>

📈 ถ้าลงทุน (${assetName})<br>
→ ซื้อ ${itemName}: <b>${investPower.toLocaleString()}</b> หน่วย<br><br>

⚠️ ความต่างกำลังซื้อ:<br>
→ ลงทุนได้มากกว่า <b>${ratio} เท่า</b><br><br>

📉 เงินเฟ้อทำให้เงินสด “ซื้อของได้น้อยลง”
`;

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels,
      datasets: [
        {
          label: assetName,
          data: investData,
          borderWidth: 2
        },
        {
          label: "เงินสด (โดนเงินเฟ้อ)",
          data: cashData,
          borderDash: [5,5],
          borderWidth: 2
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color: "#fff" } }
      },
      scales: {
        x: { ticks: { color: "#fff" } },
        y: { ticks: { color: "#fff" } }
      }
    }
  });

  currentStep = 5;
  showStep(5);
}
</script>

</body>
</html>
